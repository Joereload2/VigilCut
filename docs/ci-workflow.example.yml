# VigilCut CI — Windows primary (factory desktop target)
name: CI

on:
  push:
    branches: [main, master, "feat/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Lint alias (svelte-check)
        run: npm run lint
      - name: Env example present (no secrets)
        shell: pwsh
        run: |
          if (-not (Test-Path .env.example)) { throw ".env.example missing" }
          # Only fail on assignment-looking secrets, not educational comments
          # (e.g. "Never put service_role" is allowed; SUPABASE_SERVICE_ROLE=xxx is not).
          $lines = Get-Content .env.example | Where-Object { $_ -notmatch '^\s*#' -and $_.Trim() -ne '' }
          foreach ($line in $lines) {
            if ($line -match '(?i)^\s*[A-Z0-9_]*(SERVICE_ROLE|SECRET|PRIVATE_KEY)\s*=\s*\S+') {
              throw "Secret-like assignment in .env.example: $line"
            }
            if ($line -match '(?i)^\s*[A-Z0-9_]*API_KEY\s*=\s*(sk-|eyJ)[A-Za-z0-9_\-]{10,}') {
              throw "API key material in .env.example: $line"
            }
          }
          Write-Host "OK .env.example"

  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Unit tests (full lib)
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib -- --nocapture
      - name: Visual library unit filter
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib pipeline::visual -- --nocapture
      - name: CLI binary builds
        run: cargo build --manifest-path src-tauri/Cargo.toml --bin vigilcut-cli

  smoke:
    runs-on: windows-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install FFmpeg (system PATH + optional sidecar)
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          Get-Command ffmpeg | Format-List
          ffmpeg -version
          if ($LASTEXITCODE -ne 0) { throw "ffmpeg not on PATH after install" }
          # Prove lavfi + a video encoder exist (smoke fixtures depend on this)
          ffmpeg -hide_banner -f lavfi -i color=c=black:s=160x120:d=0.2 -f null - 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) { throw "ffmpeg lavfi color source failed" }
          npm ci --ignore-scripts
          npm run setup:ffmpeg
          if (-not (Test-Path src-tauri/binaries/ffmpeg.exe)) {
            Write-Host "sidecar missing — tests will use PATH ffmpeg via resolve_ffmpeg()"
          }
      - name: Smoke pipeline
        run: cargo test --manifest-path src-tauri/Cargo.toml --test smoke_pipeline -- --nocapture
      - name: Smoke clipping
        run: cargo test --manifest-path src-tauri/Cargo.toml --test smoke_clipping -- --nocapture
      - name: Smoke visual (overlay + library)
        run: cargo test --manifest-path src-tauri/Cargo.toml --test smoke_visual -- --nocapture
      - name: Smoke visual intel (match → mock gen → QA)
        run: cargo test --manifest-path src-tauri/Cargo.toml --test smoke_visual_intel -- --nocapture
        env:
          VIGILCUT_IMAGE_PROVIDER: mock

  e2e:
    runs-on: windows-latest
    needs: [smoke]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install FFmpeg
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          ffmpeg -version
          npm ci --ignore-scripts
          npm run setup:ffmpeg
      - name: E2E factory
        run: cargo test --manifest-path src-tauri/Cargo.toml --test e2e_factory -- --nocapture
      - name: E2E clipping
        run: cargo test --manifest-path src-tauri/Cargo.toml --test e2e_clipping -- --nocapture

  supabase-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic SQL migration sanity
        run: |
          set -euo pipefail
          f=supabase/migrations/20260722000000_visual_library.sql
          test -f "$f"
          ! grep -qiE 'service_role|eyJhbGci' "$f"
          grep -q 'CREATE TABLE IF NOT EXISTS public.media_assets' "$f"
          grep -q 'CREATE TABLE IF NOT EXISTS public.visual_concepts' "$f"
          grep -q 'CREATE TABLE IF NOT EXISTS public.generation_jobs' "$f"
          grep -q 'ENABLE ROW LEVEL SECURITY' "$f"
          grep -q 'visual-library' "$f"
          grep -q 'WITH CHECK' "$f"
          echo "Supabase migration checks OK"
