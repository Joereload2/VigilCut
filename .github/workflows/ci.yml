# VigilCut CI — Windows primary (factory desktop target)
name: CI

on:
  push:
    branches: [main, master, "feat/**"]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Lint alias (svelte-check)
        run: npm run lint

  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib -- --nocapture

  # Smoke needs FFmpeg — install via winget/choco if available; skip soft-fail otherwise
  smoke:
    runs-on: windows-latest
    needs: [rust]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install FFmpeg
        run: |
          choco install ffmpeg -y --no-progress
          ffmpeg -version
        continue-on-error: true
      - name: Smoke pipeline
        run: cargo test --manifest-path src-tauri/Cargo.toml --test smoke_pipeline -- --nocapture
        continue-on-error: true
